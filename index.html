<!-- 
  GLIZZY RANKINGS 2026
  ---------------------------------------------------
  CONFIG — change these for your setup:
  1) SHEET_PASSWORD_HASH: SHA-256 hash of the shared password (see comment below).
  2) SHEET_ID: the Google Sheet's file ID (from its URL).
     IMPORTANT: the sheet must be shared as "Anyone with the link → Viewer"
     for the live pull to work, since this page has no Google login of its own.
  3) WEBAPP_URL: the deployed Apps Script Web App URL that powers the
     "Edit My Ratings" panel. See the comment above doPost() in the
     Apps Script file for deployment steps. Leave the placeholder in place
     and the Edit panel will show a "not configured yet" message instead
     of failing silently.
  4) EVALUATORS: the exact list of person-sheet tab names (nicknames from
     the Users sheet). This list is NOT pulled live from the spreadsheet —
     update it here if you add, remove, or rename an evaluator.
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Libre+Franklin:wght@400;600;800&display=swap');

  :root {
    --deli-red: #C1272D;
    --mustard: #E8A93B;
    --bun: #F3E1B5;
    --char: #241C18;
    --relish: #6E8B3D;
    --paper: #FBF6EA;
  }

  * { box-sizing: border-box; }

  .glz-root {
    font-family: 'Libre Franklin', sans-serif;
    background: var(--paper);
    background-image:
      repeating-linear-gradient(45deg, rgba(193,39,45,0.05) 0 12px, transparent 12px 24px);
    color: var(--char);
    min-height: 100%;
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .glz-title {
    font-family: 'Alfa Slab One', serif;
    font-size: clamp(28px, 5vw, 48px);
    color: var(--deli-red);
    text-shadow: 3px 3px 0 var(--mustard);
    letter-spacing: 1px;
    margin: 0 0 4px 0;
    text-align: center;
  }

  .glz-subtitle {
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--char);
    opacity: 0.65;
    margin-bottom: 28px;
    text-align: center;
  }

  /* ---- login card ---- */
  .glz-card {
    background: var(--bun);
    border: 3px solid var(--char);
    border-radius: 10px;
    padding: 28px 30px;
    max-width: 360px;
    width: 100%;
    box-shadow: 6px 6px 0 var(--char);
  }

  .glz-card label {
    display: block;
    font-weight: 800;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }

  .glz-card input, .glz-card select {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 2px solid var(--char);
    border-radius: 6px;
    margin-bottom: 12px;
    font-family: inherit;

  .glz-btn {
    width: 100%;
    padding: 11px;
    background: var(--deli-red);
    color: var(--paper);
    border: 2px solid var(--char);
    border-radius: 6px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-size: 13px;
    cursor: pointer;
    transition: transform 0.08s ease;
  }
  .glz-btn:hover { transform: translateY(-1px); }
  .glz-btn:active { transform: translateY(1px); }
  .glz-btn:focus-visible, .glz-card input:focus-visible, .glz-card select:focus-visible { outline: 3px solid var(--relish); outline-offset: 2px; }
  .glz-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .glz-error {
    color: var(--deli-red);
    font-size: 13px;
    font-weight: 600;
    margin: -4px 0 12px 0;
    min-height: 16px;
  }

  /* ---- board ---- */
  .glz-board {
    width: 100%;
    max-width: 560px;
  }

  .glz-toprow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .glz-refresh {
    background: var(--char);
    color: var(--paper);
    border: none;
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .glz-refresh:focus-visible { outline: 3px solid var(--relish); outline-offset: 2px; }

  .glz-status {
    font-size: 12px;
    font-weight: 600;
    opacity: 0.7;
  }

  .glz-tile {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--paper);
    border: 2px solid var(--char);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 10px;
  }

  .glz-tile.gold {
    background: var(--mustard);
    box-shadow: 4px 4px 0 var(--char);

  .glz-rank {
    font-family: 'Alfa Slab One', serif;

    text-align: center;
    color: var(--deli-red);
    flex-shrink: 0;
  }

  .glz-tile.gold .glz-rank { color: var(--char); }

  .glz-info { flex: 1; min-width: 0; }

  .glz-brand {
    font-weight: 800;
    font-size: 15px;
    margin-bottom: 6px;
  }

  .glz-price {
    font-size: 11px;
    font-weight: 700;
    opacity: 0.7;
    margin-top: 6px;
  }

  .glz-location {
    font-size: 11px;
    font-weight: 600;
    opacity: 0.6;
    margin-top: 3px;
    overflow-wrap: break-word;
  }

  .glz-bar-track {
    background: rgba(36,28,24,0.12);
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
  }

  .glz-bar-fill {
    height: 100%;
    background: var(--relish);
    border-radius: 999px;
  }

  .glz-tile.gold .glz-bar-fill { background: var(--deli-red); }

  .glz-score {
    font-family: 'Alfa Slab One', serif;
    font-size: 18px;
    width: 54px;
    text-align: right;
    flex-shrink: 0;
  }

  .glz-unrated {
    font-size: 11px;
    font-weight: 700;
    opacity: 0.55;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .glz-footnote {
    font-size: 11px;
    opacity: 0.55;
    text-align: center;
    margin-top: 18px;
    line-height: 1.5;
  }

  .glz-empty, .glz-loading {
    text-align: center;
    padding: 30px 10px;
    font-weight: 600;
    opacity: 0.7;
  }

  .glz-error-box {
    background: #fdecec;
    border: 2px solid var(--deli-red);
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    line-height: 1.6;
  }
  .glz-error-box strong { display: block; margin-bottom: 6px; }

  /* ---- edit ratings modal ---- */
  .glz-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(36,28,24,0.55);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 30px 16px;
    overflow-y: auto;
    z-index: 1000;
  }

  .glz-modal {
    background: var(--paper);
    border: 3px solid var(--char);
    border-radius: 10px;
    box-shadow: 6px 6px 0 var(--char);
    max-width: 520px;
    width: 100%;
    padding: 24px;
  }

  .glz-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .glz-modal-title {
    font-family: 'Alfa Slab One', serif;
    font-size: 20px;
    color: var(--deli-red);
  }

  .glz-modal-close {
    background: none;
    border: none;
    font-size: 20px;
    font-weight: 800;
    cursor: pointer;
    color: var(--char);
    line-height: 1;
    padding: 4px 8px;
  }
  .glz-modal-close:focus-visible { outline: 3px solid var(--relish); outline-offset: 2px; }

  .glz-rating-card {
    border: 2px solid var(--char);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 14px;
    background: var(--bun);
  }

  .glz-rating-card-title {
    font-weight: 800;
    font-size: 14px;
    margin-bottom: 10px;
  }

  .glz-field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }

  .glz-field label {
    display: block;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.7;
    margin-bottom: 3px;
  }

  .glz-field input {
    width: 100%;
    padding: 7px 8px;
    font-size: 13px;
    border: 2px solid var(--char);
    border-radius: 5px;
    font-family: inherit;
    background: var(--paper);
  }

  .glz-card-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .glz-card-actions button {
    flex: 1;
    padding: 8px;
    border-radius: 6px;
    border: 2px solid var(--char);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 11px;
    cursor: pointer;
  }

  .glz-save-btn { background: var(--relish); color: var(--paper); }
  .glz-delete-btn { background: var(--paper); color: var(--deli-red); }

  .glz-card-msg {
    font-size: 11px;
    font-weight: 700;
    margin-top: 8px;
    min-height: 14px;
  }
  .glz-card-msg.err { color: var(--deli-red); }
  .glz-card-msg.ok { color: var(--relish); }
</style>

<div class="glz-root" id="glz-root"></div>
<div id="glz-modal-container"></div>

<script>
(function () {
  // ===== CONFIG — EDIT THESE =====
  // Password is stored as a SHA-256 hash, not plain text, so it doesn't
  // show up in "View Page Source." This is light obscurity, NOT real
  // security — anyone determined could still brute-force or hash-lookup it,
  // and the Google Sheet CSV itself is still reachable directly by URL if
  // it's shared "Anyone with the link." Don't put sensitive data behind this.
  //
  // To change the password: run this in any browser console, then paste
  // the result below as SHEET_PASSWORD_HASH:
  //   crypto.subtle.digest("SHA-256", new TextEncoder().encode("yourNewPassword"))
  //     .then(b => console.log(Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,"0")).join("")))
  // If you change this, also update WEBAPP_PASSWORD_HASH in the Apps
  // Script file, or Edit/Delete will fail with "Wrong password" even
  // though login here still works.
  const SHEET_PASSWORD_HASH = "0951d8f373f8ff967f57bee489a4c3450da1b2c7cb103701e2f91b199f0dcbbe";
  const SHEET_ID = "19Yl9MAaKys6txHjgJUDjjbcx9X3d1PgYy3qb4Om1eE0";
  const SHEET_TAB = "Summary";
  const SESSION_KEY = "glz_session_expires_at";
  const SESSION_HASH_KEY = "glz_session_pw_hash";
  const SESSION_DURATION_MS = 20 * 60 * 1000; // 20 minutes

  // Paste the URL from Deploy > New deployment > Web app in the Apps
  // Script editor. Until you do, the Edit panel shows a setup message
  // instead of trying (and failing) to call it.
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbydT8GfG2ufRWCUYvToFAqUQIMzAhpnP1N4Mw9eaAbwMHJsD7C-B025TrmCAEiM8ZBnCQ/exec";

  // Must match your person-sheet tab names / Users-sheet nicknames exactly.
  // Not pulled live from the spreadsheet — update this list by hand if you
  // add, remove, or rename an evaluator.
  const EVALUATORS = ["Classy D", "Dr Hux", "Ben Jammin", "Boston Rob"];
  // ================================

  let logoutTimer = null;
  let sessionPasswordHash = null;

  async function hashPassword(text) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  // Session lives in sessionStorage (cleared when the tab/browser closes)
  // and expires 20 min after login, even if the tab stays open the whole
  // time. The password hash is stored alongside it so the Edit panel can
  // authenticate to the Web App without asking for the password a second
  // time mid-session — it carries the same trust level as the read-only
  // login already does, since both are just this shared hash.
  function startSession(passwordHash) {
    sessionPasswordHash = passwordHash;
    const expiresAt = Date.now() + SESSION_DURATION_MS;
    try {
      sessionStorage.setItem(SESSION_KEY, String(expiresAt));
      sessionStorage.setItem(SESSION_HASH_KEY, passwordHash);
    } catch (e) { /* storage unavailable, session just won't persist across refresh */ }
    scheduleAutoLogout(expiresAt);
  }

  function hasValidSession() {
    let expiresAt;
    try { expiresAt = parseInt(sessionStorage.getItem(SESSION_KEY), 10); } catch (e) { return false; }
    if (!expiresAt || isNaN(expiresAt) || Date.now() >= expiresAt) return false;
    try { sessionPasswordHash = sessionStorage.getItem(SESSION_HASH_KEY) || null; } catch (e) { sessionPasswordHash = null; }
    scheduleAutoLogout(expiresAt);
    return true;
  }

  function clearSession() {
    sessionPasswordHash = null;
    try {
      sessionStorage.removeItem(SESSION_KEY);
      sessionStorage.removeItem(SESSION_HASH_KEY);
    } catch (e) {}
    if (logoutTimer) { clearTimeout(logoutTimer); logoutTimer = null; }
  }

  function scheduleAutoLogout(expiresAt) {
    if (logoutTimer) clearTimeout(logoutTimer);
    const msLeft = expiresAt - Date.now();
    logoutTimer = setTimeout(() => {
      loggedIn = false;
      clearSession();
      closeModal();
      renderLogin('Your session timed out — please log in again.');
    }, Math.max(0, msLeft));
  }

  const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_TAB)}`;

  const root = document.getElementById('glz-root');
  const modalContainer = document.getElementById('glz-modal-container');
  let loggedIn = false;

  function parseCsvLine(line) {
    const out = [];
    let cur = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (inQuotes) {
        if (c === '"' && line[i + 1] === '"') { cur += '"'; i++; }
        else if (c === '"') { inQuotes = false; }
        else { cur += c; }
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ',') { out.push(cur); cur = ''; }
        else cur += c;
      }
    }
    out.push(cur);
    return out;
  }

  // Strips everything except digits, a decimal point, and a leading minus
  // sign before parsing. Google's CSV export renders currency-formatted
  // cells (number format "$"#,##0.00) as formatted text like "$10.91" or
  // "$1,234.50" rather than a raw number, and parseFloat() on a string that
  // starts with "$" returns NaN. This makes price parsing tolerant of that
  // formatting either way — a plain "10.91" still parses fine. The Apps
  // Script now also sanitizes prices at the source, so this is a second
  // layer of protection rather than the only one.
  function parsePriceValue(raw) {
    if (!raw || raw.trim() === '') return null;
    const cleaned = raw.replace(/[^0-9.\-]/g, '');
    if (cleaned === '') return null;
    const num = parseFloat(cleaned);
    return isNaN(num) ? null : num;
  }

  function parseStandings(csvText) {
    const lines = csvText.split(/\r?\n/).filter(l => l.trim().length > 0);
    const rows = [];
    for (let i = 1; i < lines.length; i++) { // skip header
      const fields = parseCsvLine(lines[i]);
      const rank = fields[6];
      const brand = fields[7];
      const score = fields[8];
      const avgPrice = fields[9];
      const bestPrice = fields[10];
      const location = fields[11];
      if (!brand || brand.trim() === '') continue;
      if (!/^\d+$/.test((rank || '').trim())) continue;
      rows.push({
        rank: parseInt(rank, 10),
        brand: brand.trim(),
        score: score && score.trim() !== '' ? parseFloat(score) : null,
        avgPrice: parsePriceValue(avgPrice),
        bestPrice: parsePriceValue(bestPrice),
        location: location && location.trim() !== '' ? location.trim() : null
      });
    }
    rows.sort((a, b) => a.rank - b.rank);
    return rows;
  }

  function render(html) { root.innerHTML = html; }

  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function renderLogin(errorMsg) {
    render(`
      <div class="glz-title">🌭 Glizzy Rankings</div>
      <div class="glz-subtitle">2026 Cumulative Standings</div>
      <div class="glz-card">
        <label for="glz-pw">Enter the shared password</label>
        <input id="glz-pw" type="password" autocomplete="off" />
        <div class="glz-error">${errorMsg || ''}</div>
        <button class="glz-btn" id="glz-login-btn">View standings</button>
      </div>
    `);
    const btn = document.getElementById('glz-login-btn');
    const input = document.getElementById('glz-pw');
    const tryLogin = async () => {
      const inputHash = await hashPassword(input.value);
      if (inputHash === SHEET_PASSWORD_HASH) {
        loggedIn = true;
        startSession(inputHash);
        loadBoard();
      } else {
        renderLogin('Wrong password — try again.');
      }
    };
    btn.addEventListener('click', tryLogin);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });
    input.focus();
  }

  function renderBoardShell(bodyHtml, statusText) {
    render(`
      <div class="glz-title">🌭 Glizzy Rankings</div>
      <div class="glz-subtitle">2026 Cumulative Standings</div>
      <div class="glz-board">
        <div class="glz-toprow">
          <span class="glz-status">${statusText || ''}</span>
          <span>
            <a class="glz-refresh" id="glz-rate-link" href="https://forms.gle/EUgfUrvWFkLpPVNM8" target="_blank" rel="noopener noreferrer" style="text-decoration:none;display:inline-block;">Rate a Glizzy</a>
            <button class="glz-refresh" id="glz-edit-btn" style="margin-left:6px;">Edit My Ratings</button>
            <button class="glz-refresh" id="glz-refresh-btn" style="margin-left:6px;">Refresh</button>
            <button class="glz-refresh" id="glz-logout-btn" style="background:transparent;color:var(--char);border:2px solid var(--char);margin-left:6px;">Log out</button>
          </span>
        </div>
        ${bodyHtml}
        <div class="glz-footnote">Pulled live from the team's Google Sheet.<br/>Cumulative score = average of everyone's ratings per brand.<br/>You'll stay logged in for 20 minutes of inactivity.</div>
      </div>
    `);
    const refreshBtn = document.getElementById('glz-refresh-btn');
    if (refreshBtn) refreshBtn.addEventListener('click', loadBoard);
    const logoutBtn = document.getElementById('glz-logout-btn');
    if (logoutBtn) logoutBtn.addEventListener('click', () => {
      loggedIn = false;
      clearSession();
      closeModal();
      renderLogin();
    });
    const editBtn = document.getElementById('glz-edit-btn');
    if (editBtn) editBtn.addEventListener('click', openEvaluatorPicker);
  }

  function tilesHtml(rows) {
    if (rows.length === 0) {
      return `<div class="glz-empty">No brands on the board yet.</div>`;
    }
    const maxScore = Math.max(1, ...rows.map(r => r.score || 0));
    return rows.map((r, idx) => {
      const isGold = idx === 0 && r.score !== null;
      const pct = r.score !== null ? Math.max(4, (r.score / maxScore) * 100) : 0;
      const scoreDisplay = r.score !== null
        ? `<div class="glz-score">${r.score.toFixed(2)}</div>`
        : `<div class="glz-unrated">Unrated</div>`;

      const priceParts = [];
      if (r.avgPrice !== null) priceParts.push(`Avg $${r.avgPrice.toFixed(2)}`);
      if (r.bestPrice !== null) priceParts.push(`Best $${r.bestPrice.toFixed(2)}`);
      const priceLine = priceParts.length ? `<div class="glz-price">${priceParts.join(' &middot; ')}</div>` : '';
      const locationLine = r.location ? `<div class="glz-location">📍 ${escapeHtml(r.location)}</div>` : '';

      return `
        <div class="glz-tile ${isGold ? 'gold' : ''}">
          <div class="glz-rank">${r.rank}</div>
          <div class="glz-info">
            <div class="glz-brand">${escapeHtml(r.brand)}</div>
            <div class="glz-bar-track"><div class="glz-bar-fill" style="width:${pct}%"></div></div>
            ${priceLine}
            ${locationLine}
          </div>
          ${scoreDisplay}
        </div>
      `;
    }).join('');
  }

  async function loadBoard() {
    renderBoardShell(`<div class="glz-loading">Loading current standings…</div>`, 'Loading…');
    try {
      const res = await fetch(CSV_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      if (text.trim().startsWith('<')) {
        // Google returns an HTML login/error page instead of CSV when access fails
        throw new Error('NOT_SHARED');
      }
      const rows = parseStandings(text);
      const now = new Date();
      renderBoardShell(tilesHtml(rows), 'Updated ' + now.toLocaleTimeString());
    } catch (err) {
      const msg = err && err.message === 'NOT_SHARED'
        ? `<div class="glz-error-box"><strong>Can't reach the sheet.</strong>
           This page pulls data straight from your browser, with no Google login of its own.
           Make sure the Google Sheet is shared as "Anyone with the link → Viewer", then hit Refresh.</div>`
        : `<div class="glz-error-box"><strong>Something went wrong loading the standings.</strong>
           ${err && err.message ? err.message : 'Unknown error'}. Try Refresh, or check that the sheet link sharing is set to "Anyone with the link".</div>`;
      renderBoardShell(msg, 'Load failed');
    }
  }

  // ===== Edit My Ratings modal =====

  function closeModal() {
    modalContainer.innerHTML = '';
  }

  // Calls the Apps Script Web App via GET, with the JSON payload
  // URL-encoded as a query parameter. This looks unusual for write
  // actions (update/delete), but it's a deliberate workaround: Apps
  // Script Web App responses from doPost() were found NOT to reliably
  // include an Access-Control-Allow-Origin header (the request succeeds
  // server-side, but the browser still blocks reading the response).
  // doGet() responses consistently include it. GET requests also skip
  // the CORS preflight (OPTIONS) step entirely, which Apps Script Web
  // Apps don't handle cleanly either.
  //
  // Tradeoff: this puts the password hash in the URL/query string rather
  // than a request body, so it's visible in browser history and in Apps
  // Script's own execution logs (still just a hash of the shared
  // password — same trust level as today, just less hidden from view).
  async function callWebApp(action, payload) {
    if (!WEBAPP_URL || WEBAPP_URL.indexOf('PASTE_YOUR') !== -1) {
      return { ok: false, error: 'The edit panel isn\'t configured yet — set WEBAPP_URL in this file to your deployed Apps Script Web App URL.' };
    }
    if (!sessionPasswordHash) {
      return { ok: false, error: 'Your session expired — please log out and back in.' };
    }
    try {
      const body = Object.assign({ action, passwordHash: sessionPasswordHash }, payload);
      const url = WEBAPP_URL + '?payload=' + encodeURIComponent(JSON.stringify(body));
      const res = await fetch(url, { method: 'GET' });
      const data = await res.json();
      return data;
    } catch (err) {
      return { ok: false, error: 'Could not reach the server: ' + (err && err.message ? err.message : 'unknown error') };
    }
  }

  function openEvaluatorPicker() {
    const options = EVALUATORS.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('');
    modalContainer.innerHTML = `
      <div class="glz-modal-overlay" id="glz-modal-overlay">
        <div class="glz-modal">
          <div class="glz-modal-header">
            <div class="glz-modal-title">Edit My Ratings</div>
            <button class="glz-modal-close" id="glz-modal-close" aria-label="Close">✕</button>
          </div>
          <label for="glz-evaluator-select">Which evaluator are you?</label>
          <select id="glz-evaluator-select">${options}</select>
          <button class="glz-btn" id="glz-load-ratings-btn">Load my ratings</button>
          <div id="glz-ratings-list"></div>
        </div>
      </div>
    `;
    document.getElementById('glz-modal-close').addEventListener('click', closeModal);
    document.getElementById('glz-modal-overlay').addEventListener('click', (e) => {
      if (e.target.id === 'glz-modal-overlay') closeModal();
    });
    document.getElementById('glz-load-ratings-btn').addEventListener('click', () => {
      const evaluator = document.getElementById('glz-evaluator-select').value;
      loadRatingsList(evaluator);
    });
  }

  async function loadRatingsList(evaluator) {
    const listEl = document.getElementById('glz-ratings-list');
    listEl.innerHTML = `<div class="glz-loading">Loading ${escapeHtml(evaluator)}'s ratings…</div>`;
    const result = await callWebApp('list', { evaluator });
    if (!result.ok) {
      listEl.innerHTML = `<div class="glz-error-box"><strong>Couldn't load ratings.</strong> ${escapeHtml(result.error || 'Unknown error')}</div>`;
      return;
    }
    if (!result.ratings || result.ratings.length === 0) {
      listEl.innerHTML = `<div class="glz-empty">No ratings yet for ${escapeHtml(evaluator)}.</div>`;
      return;
    }
    listEl.innerHTML = result.ratings.map(r => ratingCardHtml(evaluator, r)).join('');
    result.ratings.forEach(r => wireCardEvents(evaluator, r.row));
  }

  function parseNotesForFields(notes) {
    // Notes are stored as "$price, location" (either half may be missing).
    // Best-effort split back into editable fields for the form.
    if (!notes) return { price: '', location: '' };
    const parts = notes.split(',').map(s => s.trim());
    let price = '';
    let location = '';
    parts.forEach(p => {
      if (p.startsWith('$')) price = p.slice(1);
      else if (p !== '') location = location ? location + ', ' + p : p;
    });
    return { price, location };
  }

  function ratingCardHtml(evaluator, r) {
    const { price, location } = parseNotesForFields(r.notes);
    const safeId = `${evaluator}-${r.row}`.replace(/[^a-zA-Z0-9\-]/g, '_');
    return `
      <div class="glz-rating-card" id="card-${safeId}" data-row="${r.row}">
        <div class="glz-rating-card-title">Row ${r.row} &mdash; Rank ${r.rank !== '' ? r.rank : '—'}</div>
        <div class="glz-field">
          <label for="brand-${safeId}">Brand</label>
          <input id="brand-${safeId}" type="text" value="${escapeHtml(r.brand)}" />
        </div>
        <div class="glz-field-row">
          <div class="glz-field">
            <label for="taste-${safeId}">Taste (0-10)</label>
            <input id="taste-${safeId}" type="number" min="0" max="10" step="0.5" value="${escapeHtml(r.taste)}" />
          </div>
          <div class="glz-field">
            <label for="snap-${safeId}">Snap/Texture (0-10)</label>
            <input id="snap-${safeId}" type="number" min="0" max="10" step="0.5" value="${escapeHtml(r.snap)}" />
          </div>
        </div>
        <div class="glz-field-row">
          <div class="glz-field">
            <label for="value-${safeId}">Value for Money (0-10)</label>
            <input id="value-${safeId}" type="number" min="0" max="10" step="0.5" value="${escapeHtml(r.value)}" />
          </div>
          <div class="glz-field">
            <label for="quality-${safeId}">Ingredient Quality (0-10)</label>
            <input id="quality-${safeId}" type="number" min="0" max="10" step="0.5" value="${escapeHtml(r.quality)}" />
          </div>
        </div>
        <div class="glz-field-row">
          <div class="glz-field">
            <label for="price-${safeId}">Price ($)</label>
            <input id="price-${safeId}" type="text" value="${escapeHtml(price)}" placeholder="e.g. 8.94" />
          </div>
          <div class="glz-field">
            <label for="location-${safeId}">Where to Find</label>
            <input id="location-${safeId}" type="text" value="${escapeHtml(location)}" />
          </div>
        </div>
        <div class="glz-card-actions">
          <button class="glz-save-btn" id="save-${safeId}">Save</button>
          <button class="glz-delete-btn" id="delete-${safeId}">Delete</button>
        </div>
        <div class="glz-card-msg" id="msg-${safeId}"></div>
      </div>
    `;
  }

  function wireCardEvents(evaluator, row) {
    const safeId = `${evaluator}-${row}`.replace(/[^a-zA-Z0-9\-]/g, '_');
    const msgEl = document.getElementById(`msg-${safeId}`);

    document.getElementById(`save-${safeId}`).addEventListener('click', async () => {
      const payload = {
        row,
        brand: document.getElementById(`brand-${safeId}`).value,
        taste: document.getElementById(`taste-${safeId}`).value,
        snap: document.getElementById(`snap-${safeId}`).value,
        value: document.getElementById(`value-${safeId}`).value,
        quality: document.getElementById(`quality-${safeId}`).value,
        price: document.getElementById(`price-${safeId}`).value,
        location: document.getElementById(`location-${safeId}`).value
      };
      msgEl.textContent = 'Saving…';
      msgEl.className = 'glz-card-msg';
      const result = await callWebApp('update', Object.assign({ evaluator }, payload));
      if (result.ok) {
        msgEl.textContent = 'Saved.';
        msgEl.className = 'glz-card-msg ok';
      } else {
        msgEl.textContent = result.error || 'Save failed.';
        msgEl.className = 'glz-card-msg err';
      }
    });

    document.getElementById(`delete-${safeId}`).addEventListener('click', async () => {
      const brandName = document.getElementById(`brand-${safeId}`).value;
      if (!window.confirm(`Delete your rating for "${brandName}"? This can't be undone.`)) return;
      msgEl.textContent = 'Deleting…';
      msgEl.className = 'glz-card-msg';
      const result = await callWebApp('delete', { evaluator, row });
      if (result.ok) {
        document.getElementById(`card-${safeId}`).remove();
      } else {
        msgEl.textContent = result.error || 'Delete failed.';
        msgEl.className = 'glz-card-msg err';
      }
    });
  }

  if (hasValidSession()) {
    loggedIn = true;
    loadBoard();
  } else {
    renderLogin();
  }
})();
</script>
